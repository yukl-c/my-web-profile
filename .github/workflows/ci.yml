name: Next.js CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          # Generate a new cache key whenever lock files or source files change
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Prepare local profile stubs
        run: |
          cp lib/data/profile.sample.ts lib/data/profile.local.ts
          mkdir -p components/profile_img
          cp components/profile_img/profileMap.sample.ts components/profile_img/profileMap.ts

      - name: Run Linter
        run: npm run lint

      - name: Run Type Check
        run: npx tsc --noEmit
        # Note: Skip this step if you are not using TypeScript

      - name: Run Tests
        run: npm run test
        # Note: Configure this script if you use Jest, Vitest, or Playwright

      - name: Build Next.js Application
        run: npm run build
